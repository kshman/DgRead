name: Release DgRead

on:
  push:
    tags:
      - 'v*' # v1.0.0, v2.1.3 같은 태그가 푸시될 때 실행
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-and-release:
    runs-on: windows-latest

    permissions:
      contents: write # 릴리스 생성을 위한 권한

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # 프로젝트의 net10.0 에 맞춤

      - name: Determine Version
        id: get_version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            # 태그 이름에서 'v' 제거 (예: v1.0.0 -> 1.0.0)
            $version = "${{ github.ref_name }}".TrimStart('v')
          }
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Publish DgRead
        shell: pwsh
        run: |
          cd DgRead
          ./publish.ps1 -Version ${{ env.VERSION }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: DgRead v${{ env.VERSION }}
          files: DgRead/bin/publish/DgRead-win-x64-v${{ env.VERSION }}.zip
          generate_release_notes: true
